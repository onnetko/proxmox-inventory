---
- name: Proxmox VM 일괄 생성 (부팅 오류 완벽 해결본)
  hosts: localhost
  gather_facts: false

  vars:
    raw_template: "{{ survey_template_name | default('106') }}"
    template_id: "{{ raw_template | regex_replace('^(\\d+).*', '\\1') | int }}"

  tasks:
    - name: "[준비] 필수 라이브러리(proxmoxer) 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[단계 1] VM 복제 생성 (Full Clone)"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "xxhci00"
        vmid: "{{ template_id }}"
        target: "xxhci01"
        name: "KFE-VM-{{ item }}"
        full: true
        state: present
      with_sequence: "start=1 end={{ survey_vm_count | default(1) }}"

    - name: "[대기] 복제 프로세스 완료 대기"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "xxhci01"
        name: "KFE-VM-{{ item }}"
      register: vm_check
      until: vm_check is success
      retries: 30
      delay: 20
      with_sequence: "start=1 end={{ survey_vm_count | default(1) }}"

    - name: "[단계 2] 하드웨어 사양 강제 교정 (부팅 루프 해결 핵심)"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "xxhci01"
        name: "KFE-VM-{{ item }}"
        
        # 템플릿(106번)의 실제 사양을 강제로 기입하여 승계 실패 우회
        cores: 8
        memory: 8192
        # [중요] 컨트롤러를 VirtIO SCSI로 강제 지정하여 마운트 오류 해결
        scsihw: virtio-scsi-pci
        
        state: present
      with_sequence: "start=1 end={{ survey_vm_count | default(1) }}"

    - name: "[단계 3] 교정된 VM 전원 켜기"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "xxhci01"
        name: "KFE-VM-{{ item }}"
        state: started
      with_sequence: "start=1 end={{ survey_vm_count | default(1) }}"
