---
- name: Proxmox VM 일괄 생성 (장치 구성 완벽 동기화)
  hosts: localhost
  gather_facts: false

  vars:
    raw_template: "{{ survey_template_name | default('106') }}"
    template_id: "{{ raw_template | regex_replace('^(\\d+).*', '\\1') | int }}"
    vm_count: "{{ (survey_vm_count | default(1)) | int }}"
    target_node: "xxhci01"

  tasks:
    - name: "[준비] 필수 라이브러리 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[단계 1] 순수 복제 실행"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "xxhci00"
        vmid: "{{ template_id }}"
        target: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
        full: true
        state: present
      with_sequence: "start=1 end={{ vm_count }}"

    - name: "[대기] 복제 완료 확인"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
      register: vm_check
      until: vm_check is success
      retries: 30
      delay: 20
      with_sequence: "start=1 end={{ vm_count }}"

    - name: "[단계 2] 템플릿 하드웨어 사양 강제 동기화"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
        
        # 1. CPU 및 메모리 승계 보장
        cores: 8
        memory: 8192
        scsihw: virtio-scsi-pci
        
        # 2. EFI 및 TPM 복구 (버전 표기 수정)
