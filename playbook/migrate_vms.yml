---
- name: Proxmox VM 지능형 마이그레이션 (부하 분산 및 최종 검증 포함)
  hosts: localhost
  gather_facts: false

  vars:
    survey_vm_ids: "{{ survey_target_vms | default('') }}"
    survey_target_nodes: "{{ survey_target_hosts | default('') }}"

  tasks:
    - name: "[준비] 필수 라이브러리 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[분석] 대상 VM 위치 확인 및 타겟 노드 부하 분석"
      environment:
        ENV_RAW_VMS: "{{ survey_vm_ids }}"
        ENV_RAW_NODES: "{{ survey_target_nodes | string }}"
      shell: |
        {{ ansible_python_interpreter | default('python3') }} -c "
        import os, json, urllib3
        from proxmoxer import ProxmoxAPI
        urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

        raw_vms = os.environ.get('ENV_RAW_VMS', '')
        raw_nodes = os.environ.get('ENV_RAW_NODES', '')
        target_vmid_list = [v.strip() for v in raw_vms.split(',') if v.strip().isdigit()]
        cleaned_nodes = raw_nodes.replace('[', '').replace(']', '').replace('\'', '').replace('\"', '')
        target_node_list = [n.strip() for n in cleaned_nodes.split(',') if n.strip()]

        migration_plan = []
        skipped_plan = []

        try:
            url = os.environ.get('PROXMOX_URL', '').replace('https://', '').replace(':8006', '')
            user = os.environ.get('PROXMOX_USER', '')
            token_id = os.environ.get('PROXMOX_TOKEN_ID', '')
            token_secret = os.environ.get('PROXMOX_TOKEN_SECRET', '')
            proxmox = ProxmoxAPI(url, user=user, token_name=token_id, token_value=token_secret, verify_ssl=False)

            resources = proxmox.cluster.resources.get(type='vm')
            node_vm_count = {}
            vms_info = {}
            for res in resources:
                if res.get('type') in ['qemu', 'lxc']:
                    node = res.get('node')
                    vmid = str(res.get('vmid'))
                    node_vm_count[node] = node_vm_count.get(node, 0) + 1
                    if vmid in target_vmid_list:
                        vms_info[vmid] = {'node': node, 'name': res.get('name')}

            nodes = proxmox.nodes.get()
            available_targets = []
            for n in nodes:
                node_name = n.get('node')
                if node_name in target_node_list and n.get('status') == 'online':
                    mem_pct = n.get('mem', 0) / n.get('maxmem', 1) if n.get('maxmem', 0) > 0 else 1.0
                    cpu_pct = n.get('cpu', 1.0)
                    vm_count_weight = node_vm_count.get(node_name, 0) * 0.05
                    score = mem_pct + cpu_pct + vm_count_weight
                    available_targets.append({'node': node_name, 'score': score})

            available_targets.sort(key=lambda x: x['score'])

            for vmid in target_vmid_list:
                if vmid not in vms_info:
                    skipped_plan.append({'vmid': vmid, 'reason': '찾을 수 없음'})
                    continue
                src_node = vms_info[vmid]['node']
                vm_name = vms_info[vmid]['name']
                if not available_targets:
                    skipped_plan.append({'vmid': vmid, 'name': vm_name, 'reason': '가용 노드 없음'})
                    continue
                best_target = available_targets[0]
                dest_node = best_target['node']
                if src_node == dest_node:
                    skipped_plan.append({'vmid': vmid, 'name': vm_name, 'reason': f'이미 {dest_node}에 있음'})
                    continue

                migration_plan.append({'vmid': vmid, 'name': vm_name, 'source_node': src_node, 'target_node': dest_node})
                best_target['score'] += 0.5 
                available_targets.sort(key=lambda x: x['score'])

            print(json.dumps({'migration_plan': migration_plan, 'skipped_plan': skipped_plan}))
        except Exception as e:
            print(json.dumps({'error': str(e), 'migration_plan': [], 'skipped_plan': []}))
        "
      register: migration_analysis_raw
      changed_when: false

    - name: "[변수 설정] 계획 수립"
      set_fact:
        migration_plan: "{{ (migration_analysis_raw.stdout | from_json).migration_plan | default([]) }}"

    - name: "[단계 1] 마이그레이션 실행 (비동기)"
      uri:
        url: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('/$', '') }}/api2/json/nodes/{{ item.source_node }}/qemu/{{ item.vmid }}/migrate"
        method: POST
        headers:
          Authorization: "PVEAPIToken={{ lookup('env', 'PROXMOX_USER') }}!{{ lookup('env', 'PROXMOX_TOKEN_ID') }}={{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        body_format: form-urlencoded
        body: { target: "{{ item.target_node }}", online: 1 }
        validate_certs: false
      loop: "{{ migration_plan }}"
      async: 3600
      poll: 0
      register: migrate_jobs

- name: "[단계 2] 완료 대기"
      async_status:
        jid: "{{ item.ansible_job_id }}"
      register: job_result
      until: job_result.finished
      retries: 240
      delay: 15
      loop: "{{ migrate_jobs.results | default([]) }}"
      when: item.ansible_job_id is defined

    - name: "[단계 3] 최종 위치 및 상태 검증 리포트"
      # [교정] 데이터를 환경 변수로 넘겨 특수 문자 충돌을 원천 차단합니다.
      environment:
        ENV_MIGRATION_PLAN: "{{ migration_plan | to_json }}"
      shell: |
        {{ ansible_python_interpreter | default('python3') }} -c "
        import os, json, urllib3, time
        from proxmoxer import ProxmoxAPI
        urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

        # 1. 환경 변수에서 안전하게 계획 데이터 로드
        plan_str = os.environ.get('ENV_MIGRATION_PLAN', '[]')
        plan = json.loads(plan_str)
        results = []

        url = os.environ.get('PROXMOX_URL', '').replace('https://', '').replace(':8006', '')
        user = os.environ.get('PROXMOX_USER', '')
        token_id = os.environ.get('PROXMOX_TOKEN_ID', '')
        token_secret = os.environ.get('PROXMOX_TOKEN_SECRET', '')
        
        proxmox = ProxmoxAPI(url, user=user, token_name=token_id, token_value=token_secret, verify_ssl=False)

        # 2. Proxmox DB가 업데이트될 시간을 아주 잠깐(2초) 기다립니다.
        time.sleep(2)

        resources = proxmox.cluster.resources.get(type='vm')
        current_vms = {str(r.get('vmid')): r.get('node') for r in resources if r.get('type') in ['qemu', 'lxc']}

        for p in plan:
            vmid = str(p['vmid'])
            target = p['target_node']
            actual = current_vms.get(vmid, 'N/A')
            status = '✅ 성공' if target == actual else '❌ 실패'
            results.append(f'- VM {vmid} ({p[\"name\"]}): {status} (목표: {target} / 현재: {actual})')
        
        if results:
            print('\n'.join(results))
        else:
            print('분석된 결과가 없습니다.')
        "
      register: final_report
      when: migration_plan | length > 0
      changed_when: false

    - name: "[완료] 마이그레이션 최종 결과 확인"
      debug:
        msg: |
          ============================================================
          📊 마이그레이션 최종 처리 결과
          ============================================================
          {{ final_report.stdout | default('진행된 마이그레이션이 없습니다.') }}
          ============================================================
