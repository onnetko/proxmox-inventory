---
- name: Proxmox VM 일괄 복제 (완벽 부하 분산 및 지능형 네이밍)
  hosts: localhost
  gather_facts: false

  vars:
    raw_template: "{{ survey_template_name | default('106 (Rocky10.0-Default)') }}"
    vm_count: "{{ (survey_vm_count | default(1)) | int }}"

  tasks:
    - name: "[준비] 필수 라이브러리 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[분석] 통합 부하(CPU+RAM) 기반 최적 분산 배치 계획 수립"
      shell: |
        {{ ansible_python_interpreter | default('python3') }} -c "
        import os, json, urllib3, re
        from proxmoxer import ProxmoxAPI
        urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

        raw_input = '{{ raw_template }}'
        vm_count = {{ vm_count }}
        match = re.search(r'^(\d+)', raw_input)
        extracted_vmid = match.group(1) if match else raw_input.strip()

        source_node = 'xxhci00'
        actual_name = raw_input
        source_vmid = extracted_vmid

        try:
            url = os.environ.get('PROXMOX_URL', '').replace('https://', '').replace(':8006', '')
            user = os.environ.get('PROXMOX_USER', '')
            token_id = os.environ.get('PROXMOX_TOKEN_ID', '')
            token_secret = os.environ.get('PROXMOX_TOKEN_SECRET', '')

            proxmox = ProxmoxAPI(url, user=user, token_name=token_id, token_value=token_secret, verify_ssl=False)

            # 1. 원본 VM 정보 찾기
            for vm in proxmox.cluster.resources.get(type='vm'):
                if str(vm.get('vmid')) == extracted_vmid or vm.get('name') == extracted_vmid:
                    source_node = vm.get('node')
                    actual_name = vm.get('name')
                    source_vmid = str(vm.get('vmid'))
                    break

            # 2. 통합 부하 스코어(Load Score) 계산
            nodes = proxmox.nodes.get()
            online_nodes = [n for n in nodes if n.get('status') == 'online']
            
            for n in online_nodes:
                # 메모리 사용률(0~1) + CPU 사용률(0~1) 합산 (낮을수록 한가함)
                mem_pct = n.get('mem', 0) / n.get('maxmem', 1) if n.get('maxmem', 0) > 0 else 1.0
                cpu_pct = n.get('cpu', 1.0)
                n['load_score'] = mem_pct + cpu_pct

            # 3. 라운드 로빈(Round-Robin) 방식으로 각 VM이 들어갈 타겟 노드 리스트 생성
            target_nodes_plan = []
            if online_nodes:
                # 부하가 적은 순서대로 노드 정렬
                online_nodes.sort(key=lambda n: n['load_score'])
                
                # 생성할 VM 개수만큼 골고루 노드 배정
                for i in range(vm_count):
                    chosen_node = online_nodes[i % len(online_nodes)].get('node')
                    target_nodes_plan.append(chosen_node)
            else:
                target_nodes_plan = [source_node] * vm_count

            # 4. 분석 결과 출력
            print(json.dumps({
                'source_node': source_node, 
                'target_nodes_plan': target_nodes_plan,  # 단일 노드가 아닌 리스트를 넘깁니다.
                'actual_template_name': actual_name,
                'source_vmid': source_vmid
            }))
            
        except Exception as e:
            print(json.dumps({
                'error': str(e), 
                'source_node': 'xxhci00', 
                'target_nodes_plan': ['xxhci01'] * vm_count, 
                'actual_template_name': actual_name, 
                'source_vmid': extracted_vmid
            }))
        "
      register: cluster_info_raw
      changed_when: false

    - name: "[변수 설정] 분석된 지능형 배치 리스트 적용"
      set_fact:
        dynamic_source_node: "{{ (cluster_info_raw.stdout | from_json).source_node }}"
        # 이제 단일 변수가 아니라 배열(List)로 받습니다. [xxhci01, xxhci02, xxhci03...]
        dynamic_target_nodes: "{{ (cluster_info_raw.stdout | from_json).target_nodes_plan }}"
        dynamic_template_name: "{{ (cluster_info_raw.stdout | from_json).actual_template_name }}"
        dynamic_source_vmid: "{{ (cluster_info_raw.stdout | from_json).source_vmid }}" 

    - name: "[알림] 통합 부하 기반 분산 배치 계획"
      debug:
        msg: "✅ 원본: [{{ dynamic_source_node }}] 노드의 '{{ dynamic_source_vmid }}' ➡️ 🎯 배치 계획: {{ dynamic_target_nodes }}"

    - name: "[단계 1] 분산 복제 명령 일괄 전송 (네이밍 규칙 + 라운드 로빈 배치)"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        
        node: "{{ dynamic_source_node }}"
        clone: "{{ dynamic_template_name }}"
        
        # [핵심] 1번 VM은 리스트의 첫 번째 노드로, 2번 VM은 두 번째 노드로 각각 매칭됩니다.
        target: "{{ dynamic_target_nodes[(item | int) - 1] }}"
        
        name: "{{ dynamic_source_vmid }}-KFE-VM-{{ item }}"
        full: true
        timeout: 3600
        state: present
      loop: "{{ range(1, (vm_count | int) + 1) | list }}"
      async: 3600
      poll: 0
      register: clone_jobs

    - name: "[대기] 전체 VM 복제 진행 상태 모니터링 (15초 주기 생존 신고)"
      async_status:
        jid: "{{ item.ansible_job_id }}"
      register: job_result
      until: job_result.finished
      retries: 240
      delay: 15
      loop: "{{ clone_jobs.results }}"
