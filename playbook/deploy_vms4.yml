---
- name: Proxmox VM 일괄 생성 (가장 단순한 복제 모드)
  hosts: localhost
  gather_facts: false

  vars:
    # 설문에서 받은 값을 숫자로 안전하게 변환
    vm_count_int: "{{ (survey_vm_count | default(1)) | int }}"
    
    # 템플릿 이름에서 ID 추출
    raw_template: "{{ survey_template_name | default('106') }}"
    template_id: "{{ raw_template | regex_replace('^(\\d+).*', '\\1') | int }}"

  tasks:
    - name: "[단계 1] VM 복제 생성 (하드웨어 승계 보장)"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        
        # 템플릿이 위치한 노드
        node: "xxhci00"
        vmid: "{{ template_id }}"
        target: "xxhci01"
        name: "KFE-VM-{{ item }}"
        full: true
        state: present
      # [수정] 오류가 발생하던 연산식을 제거하고 직관적인 루프로 변경
      loop: "{{ range(1, vm_count_int + 1) }}"

    - name: "[단계 2] 생성된 VM 전원 켜기"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "xxhci01"
        name: "KFE-VM-{{ item }}"
        state: started
      loop: "{{ range(1, vm_count_int + 1) }}"
