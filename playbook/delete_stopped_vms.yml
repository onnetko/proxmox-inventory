---
- name: Proxmox VM 일괄 정리 (전원 OFF 상태만 안전 삭제)
  hosts: localhost
  gather_facts: false

  vars:
    # AWX 설문에서 입력받은 VM ID 리스트
    survey_vm_ids: "{{ survey_target_vms | default('') }}"

  tasks:
    - name: "[준비] 필수 라이브러리 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[분석] 대상 VM 상태(Power) 및 위치(Node) 사전 검증"
      shell: |
        {{ ansible_python_interpreter | default('python3') }} -c "
        import os, json, urllib3
        from proxmoxer import ProxmoxAPI
        urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

        raw_ids = '{{ survey_vm_ids }}'
        target_ids = [vid.strip() for vid in raw_ids.split(',') if vid.strip().isdigit()]

        to_delete = []
        skipped_running = []
        not_found = list(target_ids)

        try:
            url = os.environ.get('PROXMOX_URL', '').replace('https://', '').replace(':8006', '')
            user = os.environ.get('PROXMOX_USER', '')
            token_id = os.environ.get('PROXMOX_TOKEN_ID', '')
            token_secret = os.environ.get('PROXMOX_TOKEN_SECRET', '')

            proxmox = ProxmoxAPI(url, user=user, token_name=token_id, token_value=token_secret, verify_ssl=False)

            for vm in proxmox.cluster.resources.get(type='vm'):
                vmid = str(vm.get('vmid'))
                if vmid in target_ids:
                    if vmid in not_found:
                        not_found.remove(vmid)
                    
                    if vm.get('status') == 'stopped':
                        to_delete.append({'vmid': vmid, 'node': vm.get('node'), 'name': vm.get('name')})
                    else:
                        skipped_running.append({'vmid': vmid, 'name': vm.get('name'), 'status': vm.get('status')})

            print(json.dumps({
                'to_delete': to_delete,
                'skipped_running': skipped_running,
                'not_found': not_found
            }))
            
        except Exception as e:
            print(json.dumps({'error': str(e), 'to_delete': [], 'skipped_running': [], 'not_found': target_ids}))
        "
      register: vm_analysis_raw
      changed_when: false

    - name: "[변수 설정] 검증된 분석 결과 적용"
      set_fact:
        vms_to_delete: "{{ (vm_analysis_raw.stdout | from_json).to_delete | default([]) }}"
        vms_skipped: "{{ (vm_analysis_raw.stdout | from_json).skipped_running | default([]) }}"
        vms_not_found: "{{ (vm_analysis_raw.stdout | from_json).not_found | default([]) }}"

    - name: "[알림] VM 삭제 진행 계획 요약"
      debug:
        msg: |
          ============================================================
          [ 🗑️ 삭제 승인 ] 꺼져있는 VM  : {{ vms_to_delete | map(attribute='vmid') | join(', ') | default('없음', true) }}
          [ ⚠️ 보호 조치 ] 실행중인 VM  : {{ vms_skipped | map(attribute='vmid') | join(', ') | default('없음', true) }} (안전 건너뜀)
          [ ❌ 검색 실패 ] 없는 VM ID   : {{ vms_not_found | join(', ') | default('없음', true) }}
          ============================================================

    - name: "[단계 1] 전원이 꺼진(Stopped) VM 일괄 삭제 실행"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        
        node: "{{ item.node }}"
        vmid: "{{ item.vmid }}"
        state: absent
      
      loop: "{{ vms_to_delete }}"
      when: vms_to_delete | length > 0
