---
- name: Proxmox VM 일괄 생성 (사양 승계 및 설문 반영)
  hosts: localhost
  gather_facts: false

  vars:
    # 설문 변수 데이터 정제
    raw_vm_count: "{{ survey_vm_count | default('1') }}"
    prefix: "{{ survey_vm_name_prefix | default('KFE-VM') }}"
    target_node: "{{ (survey_target_node is iterable and survey_target_node is not string) | ternary(survey_target_node[0], survey_target_node) | default('xxhci01') }}"
    
    # 템플릿 선택 및 ID 추출
    raw_template: "{{ (survey_template_name is iterable and survey_template_name is not string) | ternary(survey_template_name[0], survey_template_name) | trim }}"
    template_id: "{{ raw_template | regex_replace('^(\\d+).*', '\\1') | int }}"
    
    # 설문에서 선택한 VNet 정보 반영
    selected_vnet: "{{ (survey_vm_vnet is iterable and survey_vm_vnet is not string) | ternary(survey_vm_vnet[0], survey_vm_vnet) }}"

  tasks:
    - name: "[준비] 필수 파이썬 라이브러리 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[단계 1] VM 복제 생성 (템플릿 사양 기반)"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        
        # 원본 노드 지정 (템플릿 위치)
        node: "xxhci00"   
        vmid: "{{ template_id }}"
        target: "{{ target_node }}"
        name: "{{ prefix }}-{{ item }}"
        
        # [핵심] Full Clone을 통해 템플릿의 모든 사양을 기본적으로 가져옵니다.
        full: true 
        timeout: 1800 
        
        # [수정] 설문에서 선택한 네트워크만 명시적으로 업데이트합니다.
        # CPU, 메모리 등의 파라미터를 삭제하여 템플릿 사양이 덮어씌워지지 않도록 보호합니다.
        net:
          net0: "virtio,bridge={{ selected_vnet }}"
          
        state: present
      loop: "{{ range(1, (raw_vm_count | int) + 1) | list }}"

    - name: "[대기] 복제 완료 및 VM 등록 확인"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMO tax_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "{{ target_node }}"
        name: "{{ prefix }}-{{ item }}"
        state: present
      register: vm_check
      until: vm_check is success
      retries: 30
      delay: 15
      loop: "{{ range(1, (raw_vm_count | int) + 1) | list }}"

    - name: "[단계 2] 신규 VM 전원 켜기"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "{{ target_node }}"
        name: "{{ prefix }}-{{ item }}"
        state: started
      loop: "{{ range(1, (raw_vm_count | int) + 1) | list }}"
