---
- name: Proxmox VM 일괄 생성 (복제 프로세스 강제 정상화)
  hosts: localhost
  gather_facts: false

  vars:
    # 설문 조사 변수 처리
    raw_vm_count: "{{ survey_vm_count | default('1') }}"
    vm_name_prefix: "{{ survey_vm_name_prefix | default('new-vm') }}"
    target_node: "{{ (survey_target_node is iterable and survey_target_node is not string) | ternary(survey_target_node[0], survey_target_node) | default('xxhci01') }}"
    template_vmid: 106  # 이미지에서 확인된 Rocky 10 템플릿 ID

  tasks:
    - name: "[단계 1] VM 복제 생성 (실행 명령 제외)"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        
        # 원본 노드 지정 (xxhci00)
        node: "xxhci00"   
        # 복제할 원본 ID (106)
        clone: "{{ template_vmid }}"
        # 생성될 대상 노드
        target: "{{ target_node }}"
        name: "{{ vm_name_prefix }}-{{ item }}"
        full: true 
        timeout: 1800 # 128GB 복제를 위한 충분한 시간
        
        # [핵심] state를 present로 설정하여 오직 '복제 생성'만 수행하게 함
        state: present
      loop: "{{ range(1, (raw_vm_count | int) + 1) | list }}"

    - name: "[단계 2] 복제 완료된 '새 VM'만 골라 전원 켜기"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        
        # 이제 명령의 대상은 새 VM이 있는 노드입니다.
        node: "{{ target_node }}"
        name: "{{ vm_name_prefix }}-{{ item }}"
        
        # 복제가 완료된 새 VM에만 실행 명령 전달
        state: started
      loop: "{{ range(1, (raw_vm_count | int) + 1) | list }}"
