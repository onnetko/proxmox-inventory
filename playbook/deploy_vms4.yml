---
- name: Proxmox VM 일괄 생성 (타임아웃 해결 및 완벽 자동화)
  hosts: localhost
  gather_facts: false

  vars:
    raw_template: "{{ survey_template_name | default('Rocky10.0-Default') }}"
    template_name: "{{ raw_template | regex_replace('^.*\\((.*)\\).*$', '\\1') | trim }}"
    vm_count: "{{ (survey_vm_count | default(1)) | int }}"
    target_node: "xxhci01"

  tasks:
    - name: "[준비] 필수 라이브러리 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[단계 1] 템플릿 완벽 복제 실행 (대용량 디스크 복사 대기)"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        
        node: "xxhci00"
        clone: "{{ template_name }}"
        target: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
        full: true
        
        # [핵심] 앤서블이 복제 완료를 기다리는 최대 시간을 1시간(3600초)으로 늘립니다.
        # Proxmox 클러스터에서 복제가 완료될 때까지 에러 없이 모니터링하며 대기합니다.
        timeout: 3600 
        
        state: present
      loop: "{{ range(1, (vm_count | int) + 1) | list }}"

    - name: "[대기] 복제 프로세스 최종 확인"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
      register: vm_check
      until: vm_check is success
      retries: 30
      delay: 20
      loop: "{{ range(1, (vm_count | int) + 1) | list }}"

    - name: "[단계 2] 복제 완료된 VM 전원 켜기"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
        state: started
      loop: "{{ range(1, (vm_count | int) + 1) | list }}"
