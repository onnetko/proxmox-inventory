---
- name: Proxmox 템플릿 기반 VM 일괄 생성 (파라미터 최종 교정)
  hosts: localhost
  gather_facts: false

  vars:
    spec_map:
      "Small (1 core / 2GB)": { "cpu": 1, "ram": 2048 }
      "Medium (2 cores / 4GB)": { "cpu": 2, "ram": 4096 }
      "Large (4 cores / 8GB)": { "cpu": 4, "ram": 8192 }

    raw_vm_count: "{{ survey_vm_count | default('1') }}"
    vm_name_prefix: "{{ survey_vm_name_prefix | default('new-vm') }}"
    
    # 리스트 처리 및 데이터 정제
    target_node: "{{ (survey_target_node is iterable and survey_target_node is not string) | ternary(survey_target_node[0], survey_target_node) | default('xxhci01') }}"
    template_full_name: "{{ (survey_template_name is iterable and survey_template_name is not string) | ternary(survey_template_name[0], survey_template_name) }}"
    selected_spec: "{{ (survey_vm_spec is iterable and survey_vm_spec is not string) | ternary(survey_vm_spec[0], survey_vm_spec) }}"
    selected_vnet: "{{ (survey_vm_vnet is iterable and survey_vm_vnet is not string) | ternary(survey_vm_vnet[0], survey_vm_vnet) }}"

  tasks:
    - name: "[준비] 필수 파이썬 라이브러리 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[생성] {{ raw_vm_count }}대의 VM 복제 및 자동 시작"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        
        node: "{{ target_node }}"
        clone: "{{ template_full_name | trim }}" # 혹시 모를 앞뒤 공백 제거
        name: "{{ vm_name_prefix }}-{{ item }}"
        full: true
        timeout: 600
        
        cores: "{{ spec_map[selected_spec].cpu | default(2) }}"
        memory: "{{ spec_map[selected_spec].ram | default(4096) }}"
        net:
          net0: "virtio,bridge={{ selected_vnet }}"
        
        # [수정] start: yes 대신 state: started를 사용하여 생성 후 즉시 실행
        state: started
      loop: "{{ range(1, (raw_vm_count | int) + 1) | list }}"
