---
- name: Proxmox 클러스터 롤링 업데이트 및 순차 재부팅
  hosts: all
  become: true
  # 한 번에 1대씩 작업을 수행하도록 강제합니다.
  serial: 1 
  gather_facts: true

  tasks:
    - name: "[{{ inventory_hostname }}] 패키지 리스트 업데이트 및 업그레이드"
      apt:
        upgrade: dist
        update_cache: yes
      register: apt_result

    - name: "[{{ inventory_hostname }}] 불필요한 패키지 삭제"
      apt:
        autoremove: yes

    - name: "[{{ inventory_hostname }}] 재부팅 필요 여부 확인"
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: "[{{ inventory_hostname }}] 재부팅 시작 및 복귀 대기"
      reboot:
        msg: "앤서블 롤링 업데이트로 인해 재부팅을 시작합니다."
        reboot_timeout: 600
        # 재부팅 후 SSH 응답뿐만 아니라 실제 서비스가 올라올 때까지 대기
        post_reboot_delay: 30 
        test_command: uptime
      when: reboot_required_file.stat.exists

    - name: "[{{ inventory_hostname }}] 클러스터 상태 정상 확인 (pvecm status)"
      command: pvecm status
      register: pvecm_output
      until: "'Quorate: Yes' in pvecm_output.stdout"
      retries: 10
      delay: 15
      changed_when: false
      when: reboot_required_file.stat.exists

    - name: "[{{ inventory_hostname }}] 노드 업데이트 완료"
      debug:
        msg: "{{ inventory_hostname }} 노드의 업데이트 및 클러스터 복귀가 완료되었습니다. 다음 노드로 이동합니다."
