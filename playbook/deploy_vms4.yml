---
- name: Proxmox VM 일괄 생성 (들여쓰기 및 하드웨어 동기화 최종)
  hosts: localhost
  gather_facts: false

  vars:
    raw_template: "{{ survey_template_name | default('106') }}"
    template_id: "{{ raw_template | regex_replace('^(\\d+).*', '\\1') | int }}"
    vm_count: "{{ (survey_vm_count | default(1)) | int }}"
    target_node: "xxhci01"

  tasks:
    - name: "[준비] 필수 라이브러리 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[단계 1] 순수 복제 실행"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "xxhci00"
        vmid: "{{ template_id }}"
        target: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
        full: true
        state: present
      # [주의] 들여쓰기가 community.proxmox.proxmox_kvm 과 동일한 레벨이어야 합니다.
      loop: "{{ range(1, (vm_count | int) + 1) | list }}"

    - name: "[대기] 복제 완료 확인"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
      register: vm_check
      until: vm_check is success
      retries: 30
      delay: 20
      loop: "{{ range(1, (vm_count | int) + 1) | list }}"

    - name: "[단계 2] 누락된 하드웨어 장치 강제 재구성"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
        
        # [핵심] 기존 VM을 업데이트 하겠다는 명시적 선언
        update: true
        
        # 1. 기본 사양 강제 주입
        cores: 8
        memory: 8192
        scsihw: virtio-scsi-pci
        
        # 2. EFI 및 TPM 복구
        efidisk0: 
          storage: "CephPool-VM-DMZ"
          format: "raw"
          efitype: "4m"
        tpmstate0:
          storage: "CephPool-VM-DMZ"
          version: "2.0"

        # 3. CD/DVD 및 네트워크 장치 복구
        ide2: "CephFS-iso:iso/Rocky-10.0-x86_64-dvd1.iso,media=cdrom"
        net0: "virtio,bridge=VLAN222"
        
        state: present
      loop: "{{ range(1, (vm_count | int) + 1) | list }}"

    - name: "[단계 3] 교정된 VM 전원 켜기"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
        state: started
      loop: "{{ range(1, (vm_count | int) + 1) | list }}"
