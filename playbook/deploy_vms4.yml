---
- name: Proxmox VM 일괄 생성 (단순 복제 모드)
  hosts: localhost
  gather_facts: false

  vars:
    # 설문 변수: 템플릿 ID와 생성 대수만 사용
    raw_template: "{{ survey_template_name | default('106') }}"
    template_id: "{{ raw_template | regex_replace('^(\\d+).*', '\\1') | int }}"
    vm_count: "{{ survey_vm_count | default(1) | int }}"
    
    # 기본값 설정
    target_node: "xxhci01"
    prefix: "KFE-VM"

  tasks:
    - name: "[단계 1] VM 복제 생성"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        
        # 최소한의 필수 파라미터만 사용
        node: "xxhci00"
        vmid: "{{ template_id }}"
        target: "{{ target_node }}"
        name: "{{ prefix }}-{{ item }}"
        full: true
        state: present
      loop: "{{ range(1, vm_count + 1) | list }}"

    - name: "[단계 2] 복제된 VM 전원 켜기"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "{{ target_node }}"
        name: "{{ prefix }}-{{ item }}"
        state: started
      loop: "{{ range(1, vm_count + 1) | list }}"
