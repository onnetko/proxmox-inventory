---
- name: Proxmox 클러스터 롤링 업데이트 및 순차 재부팅
  hosts: XXHOSTS
  become: true
  serial: 1 
  gather_facts: true

  tasks:
    - name: "[{{ inventory_hostname }}] 패키지 리스트 업데이트 및 업그레이드 (무인 자동화 모드)"
      apt:
        upgrade: dist
        update_cache: yes
        autoremove: yes
        dpkg_options: 'force-confdef,force-confold'
      environment:
        DEBIAN_FRONTEND: noninteractive
      register: apt_result

    - name: "[{{ inventory_hostname }}] 재부팅 필요 여부 확인"
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: "[{{ inventory_hostname }}] 재부팅이 필요한 경우에만 재부팅 실행 (필요 없으면 자동 Skip)"
      reboot:
        msg: "앤서블 롤링 업데이트로 인해 재부팅을 시작합니다."
        reboot_timeout: 600
        post_reboot_delay: 30 
        test_command: uptime
      when: reboot_required_file.stat.exists

    - name: "[{{ inventory_hostname }}] 서비스 재시작 대비 SSH 연결 상태 안정화 대기"
      # 업데이트 도중 네트워크나 SSH 데몬이 재시작되었을 경우를 대비해 연결을 재확인합니다.
      wait_for_connection:
        timeout: 300
        delay: 5

    - name: "[{{ inventory_hostname }}] 클러스터 상태 정상 확인 (pvecm status)"
      # 리눅스 네이티브 명령어(grep)를 사용하여 훨씬 더 안정적으로 상태를 추출합니다.
      shell: pvecm status | grep -iE "Quorate:\s+Yes"
      register: pvecm_output
      until: pvecm_output.rc == 0
      # 클러스터 안정화 시간을 넉넉히 주기 위해 최대 5분(20번 * 15초)까지 대기합니다.
      retries: 20
      delay: 15
      changed_when: false
      # 명령어 실행 중 코로싱크 재시작으로 인한 일시적 에러(rc != 0)를 무시하고 재시도합니다.
      failed_when: pvecm_output.rc != 0 and pvecm_output.attempts == 20

    - name: "[{{ inventory_hostname }}] 노드 업데이트 완료"
      debug:
        msg: >
          {{ inventory_hostname }} 노드의 업데이트가 완료되었습니다. 
          (재부팅 수행 여부: {{ '진행됨' if reboot_required_file.stat.exists else '필요없음(건너뜀)' }}) 
          다음 노드로 이동합니다.
