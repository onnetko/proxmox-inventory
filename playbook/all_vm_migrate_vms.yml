---
- name: Proxmox 노드 긴급 대피 (LXC/VM 최적화 및 실시간 추적)
  hosts: localhost
  gather_facts: false

  vars:
    source_node_input: "{{ survey_source_node | default('') }}"
    target_nodes_input: "{{ survey_target_nodes | default('') }}"

  tasks:
    - name: "[분석] 출발지 리소스 추출 및 지능형 부하 분산 계획 수립"
      # (기존 파이썬 분석 스크립트와 동일)
      shell: |
        # ... (생략: 위에서 제공한 분석 파이썬 코드)
      register: evacuate_analysis_raw
      changed_when: false

    - name: "[단계 1] 마이그레이션 실행 (타입별 최적화 방식 적용)"
      uri:
        url: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('/$', '') }}/api2/json/nodes/{{ item.source_node }}/{{ item.type }}/{{ item.vmid }}/migrate"
        method: POST
        headers:
          Authorization: "PVEAPIToken={{ lookup('env', 'PROXMOX_USER') }}!{{ lookup('env', 'PROXMOX_TOKEN_ID') }}={{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        body:
          target: "{{ item.target_node }}"
          # [핵심 교정] VM(qemu)은 무중단(online:1), 컨테이너(lxc)는 재동작(online:0) 방식을 적용합니다.
          online: "{{ '1' if item.type == 'qemu' else '0' }}"
          restart: "{{ '0' if item.type == 'qemu' else '1' }}"
        body_format: form-urlencoded
        validate_certs: false
        status_code: 200
        return_content: yes
      loop: "{{ (evacuate_analysis_raw.stdout | from_json).plan | default([]) }}"
      async: 3600
      poll: 0
      register: migrate_jobs

    - name: "[단계 2] 실시간 위치 추적 및 최종 안착 확인 (최대 30분)"
      # (기존 실시간 추적 파이썬 스크립트와 동일)
      shell: |
        # ... (생략: 위에서 제공한 추적 파이썬 코드)
      register: final_report
      when: (evacuate_analysis_raw.stdout | from_json).plan | length > 0
      changed_when: false

    - name: "[완료] 노드 대피 최종 결과 보고"
      debug:
        msg: |
          ============================================================
          🏁 노드 비우기(Evacuate) 작업 완료 리포트
          ============================================================
          {{ final_report.stdout | default('이동할 대상이 없었습니다.') }}
          ============================================================
