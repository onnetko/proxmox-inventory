---
- name: Proxmox 지능형 자원 리밸런싱 (CPU+RAM 기반 / AWX 보호)
  hosts: localhost
  gather_facts: false

  vars:
    # 보호할 VM 이름 키워드 (기본값: awx). 대소문자를 구분하지 않습니다.
    exclude_keywords_input: "{{ survey_exclude_keywords | default('awx') }}"

  tasks:
    - name: "[준비] 필수 라이브러리 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[분석] CPU 및 RAM 부하 기반 리밸런싱 시뮬레이션 수행"
      environment:
        ENV_EXCLUDE_KEYWORDS: "{{ exclude_keywords_input }}"
      shell: |
        {{ ansible_python_interpreter | default('python3') }} -c "
        import os, json, urllib3
        from proxmoxer import ProxmoxAPI
        urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

        raw_keywords = os.environ.get('ENV_EXCLUDE_KEYWORDS', 'awx')
        exclude_keywords = [k.strip().lower() for k in raw_keywords.split(',') if k.strip()]

        try:
            url = os.environ.get('PROXMOX_URL', '').replace('https://', '').replace(':8006', '')
            user = os.environ.get('PROXMOX_USER', '')
            token_id = os.environ.get('PROXMOX_TOKEN_ID', '')
            token_secret = os.environ.get('PROXMOX_TOKEN_SECRET', '')
            proxmox = ProxmoxAPI(url, user=user, token_name=token_id, token_value=token_secret, verify_ssl=False)

            # 1. 온라인 노드들의 현재 CPU/RAM 부하 스코어 계산
            nodes_raw = proxmox.nodes.get()
            node_stats = {}
            for n in nodes_raw:
                if n.get('status') == 'online':
                    mem_ratio = float(n.get('mem', 0)) / float(n.get('maxmem', 1))
                    cpu_ratio = float(n.get('cpu', 0))
                    node_stats[n['node']] = {
                        'score': mem_ratio + cpu_ratio,
                        'maxmem': float(n.get('maxmem', 1)),
                        'movable_vms': []
                    }

            # 2. 실행 중인 자원 스캔 및 AWX 보호 (고정 자산 제외)
            resources = proxmox.cluster.resources.get(type='vm')
            for res in resources:
                if res.get('status') == 'running':
                    node = res.get('node')
                    if node in node_stats:
                        name_lower = res.get('name', '').lower()
                        if not any(kw in name_lower for kw in exclude_keywords):
                            node_stats[node]['movable_vms'].append(res)

            # 3. 부하 분산 시뮬레이션 루프 (최대 50회 제한으로 무한 루프 방지)
            plan = []
            for _ in range(50):
                # 점수 오름차순 정렬 (0번째가 가장 널널함, 마지막이 가장 부하 심함)
                sorted_nodes = sorted(node_stats.items(), key=lambda x: x[1]['score'])
                lowest_node, lowest_data = sorted_nodes[0]
                
                # 가장 부하가 심하면서 '이동 가능한 VM'을 가진 노드 찾기
                donor_idx = -1
                for i in range(len(sorted_nodes)-1, -1, -1):
                    if sorted_nodes[i][1]['movable_vms']:
                        donor_idx = i
                        break
                
                if donor_idx <= 0:
                    break # 더 이상 옮길 VM이 없거나 완벽히 균형 잡힘
                    
                highest_node, highest_data = sorted_nodes[donor_idx]

                # 가장 높은 노드와 가장 낮은 노드의 부하 차이가 10% 미만이면 종료
                if highest_data['score'] - lowest_data['score'] < 0.10:
                    break

                # VM 하나 추출 및 해당 VM의 부하 가중치 계산
                vm_to_move = highest_data['movable_vms'].pop()
                vm_mem = float(vm_to_move.get('mem', 0))
                vm_cpu_weight = float(vm_to_move.get('cpu', 0))
                
                # 출발지 점수 차감
                highest_data['score'] -= ((vm_mem / highest_data['maxmem']) + vm_cpu_weight)
                # 목적지 점수 증가 (목적지의 전체 메모리 기준으로 비율 재계산)
                lowest_data['score'] += ((vm_mem / lowest_data['maxmem']) + vm_cpu_weight)

                plan.append({
                    'vmid': str(vm_to_move['vmid']),
                    'name': vm_to_move['name'],
                    'source_node': highest_node,
                    'target_node': lowest_node,
                    'type': vm_to_move['type']
                })

            print(json.dumps({'plan': plan}))
        except Exception as e:
            print(json.dumps({'plan': [], 'error': str(e)}))
        "
      register: rebalance_analysis
      changed_when: false

    - name: "[단계 1] 마이그레이션 명령 전송 및 즉시 종료 (Proxmox 백그라운드 위임)"
      uri:
        url: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('/$', '') }}/api2/json/nodes/{{ item.source_node }}/{{ item.type }}/{{ item.vmid }}/migrate"
        method: POST
        headers:
          Authorization: "PVEAPIToken={{ lookup('env', 'PROXMOX_USER') }}!{{ lookup('env', 'PROXMOX_TOKEN_ID') }}={{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        body: "{{ (item.type == 'qemu') | ternary({'target': item.target_node, 'online': 1}, {'target': item.target_node, 'online': 0, 'restart': 1}) }}"
        body_format: form-urlencoded
        validate_certs: false
        status_code: [200, 500]
        return_content: yes
      loop: "{{ (rebalance_analysis.stdout | from_json).plan | default([]) }}"
      when: (rebalance_analysis.stdout | from_json).plan | length > 0
      register: api_responses

    - name: "[오류 진단] API 명령 접수 확인"
      fail:
        msg: "명령 거부됨: {{ item.content }}"
      loop: "{{ api_responses.results | default([]) }}"
      when: 
        - item.json is defined
        - item.json.data is none or item.json.data == ""
        - not item.get('skipped', false)

    - name: "[완료] 리밸런싱 지시 완료 리포트"
      debug:
        msg: |
          ============================================================
          ⚖️ 클러스터 자원 기반 리밸런싱 명령 전송 완료 (AWX 보호)
          ============================================================
          총 {{ (rebalance_analysis.stdout | from_json).plan | length | default(0) }}대의 가상머신/컨테이너 이동 명령이 전달되었습니다.
          AWX는 성공적으로 작업을 마치고 연결을 종료합니다.
          실제 데이터 전송은 Proxmox가 백그라운드에서 안전하게 수행합니다.
          ============================================================
