---
- name: Proxmox VM 일괄 생성 (진짜 Clone 로직 적용본)
  hosts: localhost
  gather_facts: false

  vars:
    # 설문에서 넘어온 값 (예: "106 (Rocky10.0-Default)")에서 이름만 추출합니다.
    # 복제 파라미터는 ID가 아닌 템플릿의 '이름'을 필요로 합니다.
    raw_template: "{{ survey_template_name | default('Rocky10.0-Default') }}"
    template_name: "{{ raw_template | regex_replace('^.*\\((.*)\\).*$', '\\1') | trim }}"
    
    vm_count: "{{ (survey_vm_count | default(1)) | int }}"
    target_node: "xxhci01"

  tasks:
    - name: "[준비] 필수 라이브러리 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[단계 1] 템플릿 완벽 복제 실행"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        
        node: "xxhci00"
        
        # [핵심 교정] vmid 대신 'clone' 파라미터를 사용하여 진짜 복제를 지시합니다.
        clone: "{{ template_name }}"
        
        target: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
        full: true
        state: present
      loop: "{{ range(1, (vm_count | int) + 1) | list }}"

    - name: "[대기] 복제 프로세스 완료 대기"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
      register: vm_check
      until: vm_check is success
      retries: 30
      delay: 20
      loop: "{{ range(1, (vm_count | int) + 1) | list }}"

    - name: "[단계 2] 복제 완료된 VM 전원 켜기"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "{{ target_node }}"
        name: "KFE-VM-{{ item }}"
        state: started
      loop: "{{ range(1, (vm_count | int) + 1) | list }}"
