---
- name: Proxmox VM & LXC 통합 지능형 마이그레이션
  hosts: localhost
  gather_facts: false

  vars:
    # AWX 설문조사: 대상 VM/LXC ID 리스트 및 타겟 노드 다중 선택
    survey_vm_ids: "{{ survey_target_vms | default('') }}"
    survey_target_nodes: "{{ survey_target_hosts | default('') }}"

  tasks:
    - name: "[준비] 필수 라이브러리 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[분석] 최적 부하 분산 및 타입별 이동 계획 수립"
      environment:
        ENV_RAW_VMS: "{{ survey_vm_ids }}"
        ENV_RAW_NODES: "{{ survey_target_nodes | string }}"
      shell: |
        {{ ansible_python_interpreter | default('python3') }} -c "
        import os, json, urllib3
        from proxmoxer import ProxmoxAPI
        urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

        raw_vms = os.environ.get('ENV_RAW_VMS', '')
        raw_nodes = os.environ.get('ENV_RAW_NODES', '')
        target_vmid_list = [v.strip() for v in raw_vms.split(',') if v.strip().isdigit()]
        cleaned_nodes = raw_nodes.replace('[', '').replace(']', '').replace('\'', '').replace('\"', '')
        target_node_list = [n.strip() for n in cleaned_nodes.split(',') if n.strip()]

        try:
            url = os.environ.get('PROXMOX_URL', '').replace('https://', '').replace(':8006', '')
            user = os.environ.get('PROXMOX_USER', '')
            token_id = os.environ.get('PROXMOX_TOKEN_ID', '')
            token_secret = os.environ.get('PROXMOX_TOKEN_SECRET', '')
            proxmox = ProxmoxAPI(url, user=user, token_name=token_id, token_value=token_secret, verify_ssl=False)

            resources = proxmox.cluster.resources.get(type='vm')
            node_vm_count, vms_info = {}, {}
            for res in resources:
                curr_node = res.get('node')
                node_vm_count[curr_node] = node_vm_count.get(curr_node, 0) + 1
                vmid = str(res.get('vmid'))
                if vmid in target_vmid_list:
                    vms_info[vmid] = {'node': curr_node, 'name': res.get('name'), 'type': res.get('type')}

            nodes = proxmox.nodes.get()
            targets_scored = []
            for n in nodes:
                name = n.get('node')
                if name in target_node_list and n.get('status') == 'online':
                    score = (n.get('mem', 0)/n.get('maxmem', 1)) + n.get('cpu', 1.0) + (node_vm_count.get(name, 0) * 0.05)
                    targets_scored.append({'node': name, 'score': score})
            targets_scored.sort(key=lambda x: x['score'])

            plan = []
            for vmid in target_vmid_list:
                if vmid not in vms_info or not targets_scored: continue
                best = targets_scored[0]
                if vms_info[vmid]['node'] == best['node']: continue
                
                plan.append({
                    'vmid': vmid, 'name': vms_info[vmid]['name'], 
                    'source_node': vms_info[vmid]['node'], 'target_node': best['node'], 
                    'type': vms_info[vmid]['type']
                })
                best['score'] += 0.3
                targets_scored.sort(key=lambda x: x['score'])
            print(json.dumps({'plan': plan}))
        except Exception as e:
            print(json.dumps({'plan': [], 'error': str(e)}))
        "
      register: analysis_raw
      changed_when: false

    - name: "[단계 1] 마이그레이션 명령 일괄 전송 (LXC/VM 최적화)"
      uri:
        url: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('/$', '') }}/api2/json/nodes/{{ item.source_node }}/{{ item.type }}/{{ item.vmid }}/migrate"
        method: POST
        headers:
          Authorization: "PVEAPIToken={{ lookup('env', 'PROXMOX_USER') }}!{{ lookup('env', 'PROXMOX_TOKEN_ID') }}={{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        # QEMU(VM)는 restart 파라미터 제외, LXC는 포함하여 호출
        body: "{{ (item.type == 'qemu') | ternary({'target': item.target_node, 'online': 1}, {'target': item.target_node, 'online': 0, 'restart': 1}) }}"
        body_format: form-urlencoded
        validate_certs: false
        status_code: 200
        return_content: yes
      loop: "{{ (analysis_raw.stdout | from_json).plan | default([]) }}"
      async: 3600
      poll: 0
      register: migrate_jobs

    - name: "[단계 2] 실시간 위치 추적 및 최종 안착 검증"
      environment:
        ENV_PLAN: "{{ (analysis_raw.stdout | from_json).plan | to_json }}"
      shell: |
        {{ ansible_python_interpreter | default('python3') }} -c "
        import os, json, urllib3, time
        from proxmoxer import ProxmoxAPI
        urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

        plan = json.loads(os.environ.get('ENV_PLAN', '[]'))
        url = os.environ.get('PROXMOX_URL', '').replace('https://', '').replace(':8006', '')
        user = os.environ.get('PROXMOX_USER', '')
        token_id = os.environ.get('PROXMOX_TOKEN_ID', '')
        token_secret = os.environ.get('PROXMOX_TOKEN_SECRET', '')
        proxmox = ProxmoxAPI(url, user=user, token_name=token_id, token_value=token_secret, verify_ssl=False)

        results, pending = [], {p['vmid']: p for p in plan}
        for _ in range(120): # 최대 20분 추적
            res = proxmox.cluster.resources.get(type='vm')
            current = {str(r.get('vmid')): r.get('node') for r in res if r.get('type') in ['qemu', 'lxc']}
            done = [vmid for vmid, p in pending.items() if current.get(vmid) == p['target_node']]
            for vmid in done:
                results.append(f'- {vmid} ({pending[vmid][\"name\"]}): ✅ 완료')
                del pending[vmid]
            if not pending: break
            time.sleep(10)
        
        for vmid, p in pending.items():
            results.append(f'- {vmid} ({p[\"name\"]}): ❌ 실패 (현재: {current.get(vmid, \"N/A\")})')
        print('\n'.join(results))
        "
      register: final_report
      when: (analysis_raw.stdout | from_json).plan | length > 0
      changed_when: false

    - name: "[완료] 최종 결과 보고"
      debug:
        msg: |
          ============================================================
          🏁 통합 마이그레이션 작업 결과
          ============================================================
          {{ final_report.stdout | default('이동할 대상이 없었습니다.') }}
          ============================================================
