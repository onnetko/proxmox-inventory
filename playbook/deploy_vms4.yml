---
- name: Proxmox VM 일괄 생성 (복제 완료 대기 포함)
  hosts: localhost
  gather_facts: false

  vars:
    raw_template: "{{ survey_template_name | default('106') }}"
    template_id: "{{ raw_template | regex_replace('^(\\d+).*', '\\1') | int }}"

  tasks:
    - name: "[준비] 필수 라이브러리(proxmoxer) 설치"
      pip:
        name: [proxmoxer, requests]
        state: present

    - name: "[단계 1] VM 복제 생성"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "xxhci00"
        vmid: "{{ template_id }}"
        target: "xxhci01"
        name: "KFE-VM-{{ item }}"
        full: true
        state: present
      with_sequence: "start=1 end={{ survey_vm_count | default(1) }}"

    - name: "[대기] 복제 완료 시까지 대기 (최대 10분)"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "xxhci01"
        name: "KFE-VM-{{ item }}"
      register: vm_check
      # VM이 인식될 때까지 20초마다 총 30번 재시도합니다.
      until: vm_check is success
      retries: 30
      delay: 20
      with_sequence: "start=1 end={{ survey_vm_count | default(1) }}"

    - name: "[단계 2] 생성된 VM 전원 켜기"
      community.proxmox.proxmox_kvm:
        api_user: "{{ lookup('env', 'PRO [lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        api_host: "{{ lookup('env', 'PROXMOX_URL') | regex_replace('https://|:8006', '') }}"
        validate_certs: false
        node: "xxhci01"
        name: "KFE-VM-{{ item }}"
        state: started
      with_sequence: "start=1 end={{ survey_vm_count | default(1) }}"
